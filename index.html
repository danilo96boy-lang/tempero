<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, setDoc, getDoc, deleteDoc, query, orderBy, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1miyZUImKwCCNwbgppUjtni860Urt-z4",
            authDomain: "tempero-3857c.firebaseapp.com",
            projectId: "tempero-3857c",
            storageBucket: "tempero-3857c.firebasestorage.app",
            messagingSenderId: "696644233661",
            appId: "1:696644233661:web:00d99dac7d8d79eecdcad4",
            measurementId: "G-7KV67X1DD0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- MAPAS FINANCEIROS E CARDÁPIO PADRÃO ---
        const cardapioEstruturado = {
            "Parmegiana de Frango": ["P", "M", "G"],
            "Frango à Milanesa": ["P", "M", "G"],
            "Parmegiana de Berinjela": ["P", "M", "G"],
            "Feijoada": ["M", "G", "Completa"],
            "Marmitex": ["P", "M", "G"],
            "Prato Feito": ["Tradicional", "Especial"],
            "Bebidas": ["Refrigerante Lata", "Suco Natural", "Água Mineral"],
            "Outros Pratos": ["Especial do Dia"]
        };

        const tabelaPrecosSugeridos = {
            "Parmegiana de Frango": {"P": 22.00, "M": 28.00, "G": 35.00},
            "Frango à Milanesa": {"P": 16.00, "M": 26.00, "G": 32.00},
            "Parmegiana de Berinjela": {"P": 21.00, "M": 27.00, "G": 34.00},
            "Feijoada": {"M": 27.00, "G": 35.00, "Completa": 45.00},
            "Marmitex": {"P": 18.00, "M": 22.00, "G": 26.00},
            "Prato Feito": {"Tradicional": 20.00, "Especial": 25.00},
            "Bebidas": {"Refrigerante Lata": 6.00, "Suco Natural": 8.00, "Água Mineral": 4.00},
            "Outros Pratos": {"Especial do Dia": 30.00}
        };

        let pedidoAtual = [];
        let historicoGeralPedidos = []; 
        let contadorPedidos = 1;
        let dadosFechamentoRelatorio = null;
        let chartPizzaInstancia = null; 
        let idPedidoEdicaoGlobal = null; 

        let horarioCorteTurno = 0; 

        window.onbeforeprint = function() {
            document.body.classList.add("modo-impressao-ticket");
        };

        window.onafterprint = function() {
            document.body.classList.remove("modo-impressao-ticket");
            const containerFita = document.getElementById('ticket-print');
            if(containerFita) containerFita.innerHTML = ''; 
        };

        window.alternarAbaMobile = function(abaNome, elementoBtn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            // Se não passar o elemento (chamada via código), localiza o botão correto
            if (!elementoBtn) {
                if (abaNome === 'venda') elementoBtn = document.querySelector(".mobile-tabs-nav .tab-btn:nth-child(1)");
                if (abaNome === 'carrinho') elementoBtn = document.querySelector(".mobile-tabs-nav .tab-btn:nth-child(2)");
                if (abaNome === 'fechamento') elementoBtn = document.querySelector(".mobile-tabs-nav .tab-btn:nth-child(3)");
                if (abaNome === 'logs') elementoBtn = document.querySelector(".mobile-tabs-nav .tab-btn:nth-child(4)");
            }
            
            if(elementoBtn) elementoBtn.classList.add('active');

            document.getElementById('card-aba-venda').classList.remove('active-tab-card');
            document.getElementById('card-aba-carrinho').classList.remove('active-tab-card');
            document.getElementById('card-aba-fechamento').classList.remove('active-tab-card');
            document.getElementById('card-aba-logs').classList.remove('active-tab-card');

            if(abaNome === 'venda') document.getElementById('card-aba-venda').classList.add('active-tab-card');
            if(abaNome === 'carrinho') document.getElementById('card-aba-carrinho').classList.add('active-tab-card');
            if(abaNome === 'fechamento') document.getElementById('card-aba-fechamento').classList.add('active-tab-card');
            if(abaNome === 'logs') document.getElementById('card-aba-logs').classList.add('active-tab-card');
            
            window.scrollTo({ top: 0, behavior: 'instant' });
        };

        window.buscarClientePorTelefone = async function(telDigitado) {
            const telLimpo = telDigitado.replace(/\D/g, ""); 
            if (telLimpo.length < 8) return;

            try {
                const docRef = doc(db, "clientes", telLimpo);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const clienteData = docSnap.data();
                    document.getElementById('cliente-nome').value = clienteData.nome || '';
                    document.getElementById('cliente-endereco').value = clienteData.endereco || '';
                }
            } catch (erro) {
                console.error("Erro ao buscar cliente na nuvem:", erro);
            }
        };

        async function salvarCadastroClienteCloud(telefone, nome, address) {
            const telLimpo = telefone.replace(/\D/g, "");
            if (!telLimpo || !nome) return;

            try {
                await setDoc(doc(db, "clientes", telLimpo), {
                    nome: nome,
                    endereco: address || '',
                    atualizadoEm: Timestamp.now()
                });
            } catch (erro) {
                console.error("Erro ao salvar cliente na nuvem:", erro);
            }
        }

        window.atualizarOpcoesMenu = function() {
            const categorySel = document.getElementById('categoria-prato').value;
            const selectTipo = document.getElementById('tipo');
            selectTipo.innerHTML = '';
            
            if (!categorySel || !cardapioEstruturado[categorySel]) {
                selectTipo.innerHTML = '<option value="">-- Selecione o prato primeiro --</option>';
                return;
            }
            
            cardapioEstruturado[categorySel].forEach(opcao => {
                selectTipo.innerHTML += `<option value="${opcao}">${opcao}</option>`;
            });
            inserirPrecoSugerido();
        };

        window.inserirPrecoSugerido = function() {
            const prato = document.getElementById('categoria-prato').value;
            const tamanho = document.getElementById('tipo').value;
            const inputValor = document.getElementById('valor');

            if (prato && tamanho && tabelaPrecosSugeridos[prato] && tabelaPrecosSugeridos[prato][tamanho] !== undefined) {
                inputValor.value = tabelaPrecosSugeridos[prato][tamanho].toFixed(2);
            } else {
                inputValor.value = '';
            }
        };

        async function sincronizarHorarioCorteCloud() {
            try {
                const docRef = doc(db, "configuracoes", "turno_atual");
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    horarioCorteTurno = docSnap.data().horarioCorte || 0;
                } else {
                    horarioCorteTurno = 0;
                }
            } catch (e) {
                horarioCorteTurno = localStorage.getItem('horarioCorteTurno') ? parseInt(localStorage.getItem('horarioCorteTurno')) : 0;
            }
        }

        window.validarAcessoSecure = async function(event) {
            event.preventDefault();
            const usuarioInput = document.getElementById('login-usuario').value.trim();
            const senhaInput = document.getElementById('login-senha').value.trim();
            const hashValido = "MTkwNjIw"; 

            if (usuarioInput.toLowerCase() === "gabriele" && btoa(senhaInput) === hashValido) {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('conteudo-sistema').style.display = 'block';
                await sincronizarHorarioCorteCloud();
                carregarHistoricoDoFirebase();
            } else {
                alert("Usuário ou Senha incorretos!");
                document.getElementById('login-senha').value = '';
            }
        };

        async function carregarHistoricoDoFirebase() {
            try {
                await sincronizarHorarioCorteCloud();
                const q = query(collection(db, "pedidos"), orderBy("numero", "desc"));
                const querySnapshot = await getDocs(q);
                
                historicoGeralPedidos = [];
                const corpoHistorico = document.getElementById('corpo-historico');
                corpoHistorico.innerHTML = '';
                
                let maiorNumeroTurnoAtual = 0;

                querySnapshot.forEach((doc) => {
                    const dados = doc.data();
                    const milisegundosDoc = dados.timestamp ? dados.timestamp.toMillis() : 0;

                    if (milisegundosDoc > horarioCorteTurno) {
                        dados.firebaseId = doc.id;
                        historicoGeralPedidos.push(dados);
                        
                        if (dados.numero > maiorNumeroTurnoAtual) {
                            maiorNumeroTurnoAtual = dados.numero;
                        }

                        let resumoItens = dados.itens.map(i => {
                            let itemQtd = i.qtd || 1;
                            let itemPrato = i.prato || "Marmita";
                            let itemTipo = i.tipo || "G";
                            let tipoLimpo = itemTipo.replace("Marmita ", "");
                            return `<span style="color:var(--cor-principal); font-weight:600;">(${itemQtd}x) [${itemPrato}]</span> ${tipoLimpo}`;
                        }).join('<br>');
                        
                        // Renderização sem flexbox interno para evitar quebras de colunas no Safari/Chrome Mobile
                        corpoHistorico.innerHTML += `
                            <tr>
                                <td><strong style="color:var(--cor-principal)">#${String(dados.numero).padStart(2, '0')}</strong></td>
                                <td>${dados.hora || '12:00'}</td>
                                <td>${dados.clienteHtml || '<span style="color:#94a3b8; font-weight:bold;">BALCÃO</span>'}</td>
                                <td>${resumoItens}</td>
                                <td><span style="font-size:11px; font-weight:700; padding:4px 8px; background:#f1f5f9; border-radius:6px; color:#475569;">${dados.pagamento || 'Dinheiro'}</span></td>
                                <td><strong>R$ ${parseFloat(dados.total || 0).toFixed(2)}</strong></td>
                                <td style="text-align:center; white-space: nowrap;">
                                    <button class="btn-reprint" style="padding: 5px 8px; font-size:11px;" onclick="reimprimirTicketPorId('${doc.id}')">🖨️ Rep</button>
                                    <button class="btn-edit" style="padding: 5px 8px; font-size:11px;" onclick="carregarPedidoParaEdicao('${doc.id}')">✏️ Edit</button>
                                    <button class="btn-delete" style="padding: 5px 8px; font-size:11px;" onclick="deletarPedidoCloud('${doc.id}')">❌ Exc</button>
                                </td>
                            </tr>
                        `;
                    }
                });
                
                contadorPedidos = maiorNumeroTurnoAtual + 1;
                historicoGeralPedidos.reverse();
            } catch (erro) {
                console.error("Erro Firebase ao carregar logs: ", erro);
            }
        }

        // --- DELETAR PEDIDO DO FIRESTORE ---
        window.deletarPedidoCloud = async function(firebaseId) {
            if(!confirm("Tem certeza que deseja excluir este pedido definitivamente?")) return;
            try {
                await deleteDoc(doc(db, "pedidos", firebaseId));
                alert("Pedido deletado!");
                await carregarHistoricoDoFirebase();
            } catch(e) {
                alert("Erro ao excluir.");
            }
        };

        // --- EDICAO TOTAL DE PEDIDO ---
        window.carregarPedidoParaEdicao = function(firebaseId) {
            const pedido = historicoGeralPedidos.find(p => p.firebaseId === firebaseId);
            if(!pedido) return alert("Pedido não localizado.");

            idPedidoEdicaoGlobal = firebaseId;

            // Altera interface para indicar modo edição
            document.getElementById('label-modo-venda').innerHTML = `✏️ Editando: Pedido #${String(pedido.numero).padStart(2, '0')}`;
            document.getElementById('btn-finalizar-checkout').innerHTML = `💾 Atualizar Dados do Pedido #${String(pedido.numero).padStart(2, '0')}`;
            
            // Restaura dados brutos do cliente nos inputs
            document.getElementById('cliente-nome').value = pedido.rawClienteNome || '';
            document.getElementById('cliente-celular').value = pedido.rawClienteCelular || '';
            document.getElementById('cliente-endereco').value = pedido.rawClienteEndereco || '';
            document.getElementById('forma-pagamento').value = pedido.pagamento || 'Dinheiro';

            // Joga os itens de volta ao array de checkout
            pedidoAtual = [...pedido.itens];
            atualizarInterface();

            alert(`Pedido #${pedido.numero} carregado na aba 'Vender'! Modifique o que precisar e finalize.`);
            window.alternarAbaMobile('venda');
        };

        function gerarHtmlFitaVia(pedido, nomeVia) {
            let dadosCliente = pedido.clienteHtml || '<strong>BALCÃO</strong>';
            let linesProdutosHtml = '';
            
            pedido.itens.forEach((item) => {
                let itemQtd = item.qtd || 1;
                let itemPrato = item.prato || "Marmita";
                let itemTipo = item.tipo || "Opção";
                let itemValor = parseFloat(item.valor || 0);

                let tipoLimpo = itemTipo.replace("Marmita ", "").replace(" (P)", " P").replace(" (M)", " M").replace(" (G)", " G").replace(" (PF)", " PF");
                let textoFinalPrato = `${itemQtd}x ${itemPrato}`;
                if(itemTipo && !itemPrato.includes(itemTipo) && itemTipo !== "Prato Feito Único" && itemTipo !== "Prato Feito Tradicional") {
                    textoFinalPrato += ` ${tipoLimpo}`;
                }

                linesProdutosHtml += `
                    <div class="ticket-item">
                        <div class="ticket-item-main">
                            <span class="ticket-item-name">${textoFinalPrato}</span>
                            <span class="ticket-item-price">R$ ${itemValor.toFixed(2)}</span>
                        </div>
                        <div class="ticket-item-obs">${item.descricao && item.descricao !== 'Sem obs' ? 'Obs: ' + item.descricao : ''}</div>
                    </div>
                `;
            });

            let pulosDeLinhaFisicos = '<br><br><br><br><br><br><br><br>';

            return `
                <div class="ticket-wrapper-via">
                    <div class="ticket-header">
                        <div class="ticket-via-tag">--- VIA: ${nomeVia} ---</div><br>
                        <span class="ticket-header-title">TEMPERO DE FAMÍLIA</span>
                        <div class="ticket-divider">--------------------------------</div>
                        <div class="ticket-wrapper-via-num"><span class="ticket-header-num-destaque"><strong>PEDIDO #${String(pedido.numero).padStart(2, '0')}</strong></span></div>
                        <div class="ticket-divider">--------------------------------</div>
                        <div style="font-size: 10px; font-weight: bold; margin-top:2px;">HORA: ${pedido.hora} | ${pedido.data.split(' ')[0]}</div>
                    </div>
                    <div class="ticket-divider">--------------------------------</div>
                    <div class="ticket-client-info">
                        ${dadosCliente}
                    </div>
                    <div class="ticket-divider">================================</div>
                    <div style="font-weight: bold; font-size: 10px; margin-bottom: 2px; text-transform: uppercase;">ITENS DO PEDIDO:</div>
                    <div>${linesProdutosHtml}</div>
                    <div class="ticket-divider">--------------------------------</div>
                    <div class="ticket-total-container">
                        <span>TOTAL GERAL:</span>
                        <span>R$ ${parseFloat(pedido.total || 0).toFixed(2)}</span>
                    </div>
                    <div class="ticket-divider">================================</div>
                    <div style="text-align:center; font-size:9.5px; font-weight:bold;">Obrigado pela preferência!</div>
                    <div class="ticket-divider">--------------------------------</div>
                    ${pulosDeLinhaFisicos}
                </div>
            `;
        }

        window.reimprimirTicketPorId = function(firebaseId) {
            const pedidoMestre = historicoGeralPedidos.find(p => p.firebaseId === firebaseId);
            if (!pedidoMestre) return alert("Pedido não localizado.");

            const containerFita = document.getElementById('ticket-print');
            containerFita.innerHTML = gerarHtmlFitaVia(pedidoMestre, "COZINHA") + gerarHtmlFitaVia(pedidoMestre, "CLIENTE");

            setTimeout(() => {
                window.print();
            }, 150);
        };

        window.adicionarItem = function(event) {
            event.preventDefault();
            const prato = document.getElementById('categoria-prato').value;
            const tipo = document.getElementById('tipo').value;
            const descricao = document.getElementById('descricao').value.trim();
            const precoUnitario = parseFloat(document.getElementById('valor').value);
            const qtd = parseInt(document.getElementById('quantidade').value);
            const pagamento = document.getElementById('forma-pagamento').value;

            const subtotalItem = precoUnitario * qtd;

            pedidoAtual.push({ 
                id: Date.now(), 
                prato: prato, 
                tipo: tipo, 
                descricao: descricao || "Sem obs", 
                precoUnitario: precoUnitario, 
                qtd: qtd, 
                valor: subtotalItem,
                pagamento: pagamento
            });
            
            atualizarInterface();

            document.getElementById('descricao').value = '';
            document.getElementById('valor').value = '';
            document.getElementById('quantidade').value = '1';
            document.getElementById('categoria-prato').value = '';
            document.getElementById('tipo').innerHTML = '<option value="">-- Selecione o prato primeiro --</option>';
            document.getElementById('categoria-prato').focus();
        };

        window.removerItem = function(id) {
            pedidoAtual = pedidoAtual.filter(item => item.id !== id);
            atualizarInterface();
        };

        function atualizarInterface() {
            const autoLista = document.getElementById('lista-itens');
            autoLista.innerHTML = '';
            let total = 0;

            pedidoAtual.forEach(item => {
                total += item.valor;
                autoLista.innerHTML += `
                    <li class="item-carrinho">
                        <div style="padding-right: 8px;">
                            <strong>${item.qtd}x - ${item.prato}</strong> (${item.tipo})<br>
                            <small style="color: var(--cor-texto-secundario)">Valor: R$ ${item.valor.toFixed(2)} | Pag: ${item.pagamento}</small>
                        </div>
                        <button class="btn-del" onclick="removerItem(${item.id})">X</button>
                    </li>
                `;
            });
            document.getElementById('total-valor').innerText = total.toFixed(2);

            const badge = document.getElementById('badge-contador-id');
            if(pedidoAtual.length > 0) {
                badge.innerText = pedidoAtual.length;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
        }

        window.finalizarEImprimirTicket = async function() {
            if (pedidoAtual.length === 0) return alert("Nenhum item inserido no pedido!");

            const nomeCliente = document.getElementById('cliente-nome').value.trim();
            const celularCliente = document.getElementById('cliente-celular').value.trim();
            const enderecoCliente = document.getElementById('cliente-endereco').value.trim();

            const agora = new Date();
            const dataFormatada = agora.toLocaleDateString('pt-BR') + ' ' + agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
            const horaSimples = agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});

            let stringClienteHistorico = '';
            let detalheClienteRelatorio = 'Consumidor Final';

            if (nomeCliente || celularCliente || enderecoCliente) {
                detalheClienteRelatorio = '';
                if (nomeCliente) {
                    stringClienteHistorico += `<strong>CLIENTE:</strong> ${nomeCliente}<br>`;
                    detalheClienteRelatorio += `<strong>${nomeCliente}</strong> `;
                }
                if (celularCliente) {
                    stringClienteHistorico += `<strong>CONTATO:</strong> ${celularCliente}<br>`;
                    detalheClienteRelatorio += `<br>Tel: ${celularCliente}`;
                }
                if (enderecoCliente) {
                    stringClienteHistorico += `<strong>END:</strong> <small>${enderecoCliente}</small>`;
                    detalheClienteRelatorio += `<br><small>End: ${enderecoCliente}</small>`;
                } else {
                    stringClienteHistorico += `<strong>LOCAL: BALCÃO</strong>`;
                    detalheClienteRelatorio += `<br><small>End: BALCÃO</small>`;
                }

                if (celularCliente && nomeCliente) {
                    await salvarCadastroClienteCloud(celularCliente, nomeCliente, enderecoCliente);
                }
            } else {
                stringClienteHistorico = '<span style="color:#94a3b8; font-weight:bold;">BALCÃO</span>';
            }

            let totalPedido = 0;
            let itensListaSimples = [];
            let formaPagamentoFinal = document.getElementById('forma-pagamento').value;

            pedidoAtual.forEach((item) => {
                totalPedido += item.valor;
                itensListaSimples.push(`(${item.qtd}x) [${item.prato}] ${item.tipo} - ${item.descricao}`);
            });

            let numeroPedidoDefinido = contadorPedidos;
            if(idPedidoEdicaoGlobal !== null){
                const pedidoAntigo = historicoGeralPedidos.find(p => p.firebaseId === idPedidoEdicaoGlobal);
                if(pedidoAntigo) numeroPedidoDefinido = pedidoAntigo.numero;
            }

            const documentoPedido = {
                numero: numeroPedidoDefinido,
                data: dataFormatada,
                hora: horaSimples,
                clienteHtml: stringClienteHistorico,
                clienteA4: detalheClienteRelatorio,
                itens: [...pedidoAtual],
                itensTxt: itensListaSimples.join('<br>'),
                pagamento: formaPagamentoFinal,
                total: totalPedido,
                timestamp: Timestamp.now(),
                rawClienteNome: nomeCliente,
                rawClienteCelular: celularCliente,
                rawClienteEndereco: enderecoCliente
            };

            try {
                if(idPedidoEdicaoGlobal !== null) {
                    await setDoc(doc(db, "pedidos", idPedidoEdicaoGlobal), documentoPedido);
                    idPedidoEdicaoGlobal = null; 
                } else {
                    await addDoc(collection(db, "pedidos"), documentoPedido);
                }
                
                const containerFita = document.getElementById('ticket-print');
                containerFita.innerHTML = gerarHtmlFitaVia(documentoPedido, "COZINHA") + gerarHtmlFitaVia(documentoPedido, "CLIENTE");

                await carregarHistoricoDoFirebase();
                
                setTimeout(() => {
                    window.print();
                }, 150);

                pedidoAtual = [];
                document.getElementById('cliente-nome').value = '';
                document.getElementById('cliente-celular').value = '';
                document.getElementById('cliente-endereco').value = '';
                document.getElementById('label-modo-venda').innerHTML = `📝 Registrar Venda`;
                document.getElementById('btn-finalizar-checkout').innerHTML = `🖨️ Autenticar & Imprimir Dupla Via`;
                atualizarInterface();

                window.alternarAbaMobile('venda');
            } catch (erro) {
                alert("Erro ao conectar com o Firebase!");
                console.error(erro);
            }
        };

        window.calcularFechamentoDiario = function() {
            if (historicoGeralPedidos.length === 0) return alert("Não existem dados faturados no turno atual.");

            let faturamentoTotal = 0;
            let totalItens = 0;
            
            let faturamentoPorPrato = {
                "Parmegiana de Frango": 0, "Frango à Milanesa": 0, "Parmegiana de Berinjela": 0,
                "Feijoada": 0, "Marmitex": 0, "Prato Feito": 0, "Bebidas": 0, "Outros Pratos": 0
            };

            let faturamentoPorMetodoPagamento = { "Dinheiro": 0, "Pix": 0, "Cartão": 0 };

            historicoGeralPedidos.forEach(p => {
                let totalPedidoMatematico = parseFloat(p.total || 0);
                faturamentoTotal += totalPedidoMatematico;
                
                let metPag = p.pagamento || "Dinheiro";
                if (faturamentoPorMetodoPagamento[metPag] !== undefined) {
                    faturamentoPorMetodoPagamento[metPag] += totalPedidoMatematico;
                } else {
                    faturamentoPorMetodoPagamento["Dinheiro"] += totalPedidoMatematico;
                }

                p.itens.forEach(i => {
                    let itemQtd = parseInt(i.qtd || 1); 
                    totalItens += itemQtd;
                    if (faturamentoPorPrato[i.prato] !== undefined) {
                        faturamentoPorPrato[i.prato] += parseFloat(i.valor || 0);
                    }
                });
            });

            let ticketMedio = faturamentoTotal / historicoGeralPedidos.length;
            const agora = new Date();
            const dataHoraString = `Emissão: ${agora.toLocaleDateString('pt-BR')} às ${agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})}`;

            document.getElementById('t-dash-faturamento').innerText = 'R$ ' + faturamentoTotal.toFixed(2);
            document.getElementById('t-dash-qtd-pedidos').innerText = historicoGeralPedidos.length + ` (${totalItens} un)`;
            document.getElementById('t-dash-ticket-medio').innerText = 'R$ ' + ticketMedio.toFixed(2);
            
            document.getElementById('dashboard-vendas-tela').style.display = 'grid';

            dadosFechamentoRelatorio = {
                dataHora: dataHoraString,
                faturamento: 'R$ ' + faturamentoTotal.toFixed(2),
                pedidos: historicoGeralPedidos.length + ` pedidos (${totalItens} itens vendidos)`,
                ticket: 'R$ ' + ticketMedio.toFixed(2),
                porCategoria: faturamentoPorPrato,
                porPagamento: faturamentoPorMetodoPagamento
            };

            const ctxPizza = document.getElementById('graficoPizzaFechamento').getContext('2d');
            
            if (chartPizzaInstancia) {
                chartPizzaInstancia.destroy();
            }

            let labelsFiltrados = [];
            let valoresFiltrados = [];
            for (const [prato, valor] of Object.entries(faturamentoPorPrato)) {
                if (valor > 0) {
                    labelsFiltrados.push(prato);
                    valoresFiltrados.push(valor);
                }
            }

            if (labelsFiltrados.length === 0) {
                labelsFiltrados = Object.keys(faturamentoPorPrato);
                valoresFiltrados = Object.values(faturamentoPorPrato);
            }

            chartPizzaInstancia = new Chart(ctxPizza, {
                type: 'pie',
                data: {
                    labels: labelsFiltrados,
                    datasets: [{
                        data: valoresFiltrados,
                        backgroundColor: ['#e11d48', '#f97316', '#fbbf24', '#10b981', '#14b8a6', '#3b82f6', '#8b5cf6', '#ec4899']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right', labels: { boxWidth: 10, font: { size: 10, family: 'sans-serif' } } }
                    }
                }
            });

            document.getElementById('btn-pdf-id').style.display = 'flex';
            document.getElementById('btn-reset-id').style.display = 'flex';
        };

        window.exportarFechamentoPDF = function() {
            if (!dadosFechamentoRelatorio) return;

            const iframePDF = document.createElement('iframe');
            iframePDF.style.position = 'fixed';
            iframePDF.style.width = '800px';
            iframePDF.style.height = '600px';
            iframePDF.style.top = '-10000px'; 
            document.body.appendChild(iframePDF);

            const iframeDoc = iframePDF.contentWindow.document;
            iframeDoc.open();

            let tabelaPedidosHtml = '';
            historicoGeralPedidos.forEach(p => {
                let canalLimpo = p.clienteA4 === 'Consumidor Final' ? '<span style="color:#94a3b8; font-weight:bold;">BALCÃO</span>' : p.clienteA4;
                tabelaPedidosHtml += `
                    <tr style="page-break-inside: avoid !important;">
                        <td style="padding: 10px 8px; border-bottom: 1px solid #e2e8f0; vertical-align: top;">
                            <strong>#${String(p.numero).padStart(2, '0')}</strong><br><span style="color:#64748b; font-size:10px;">${p.hora || '12:00'}</span>
                        </td>
                        <td style="padding: 10px 8px; border-bottom: 1px solid #e2e8f0; vertical-align: top; font-size: 11px; color:#334155;">
                            ${canalLimpo}
                        </td>
                        <td style="padding: 10px 8px; border-bottom: 1px solid #e2e8f0; vertical-align: top; font-size: 11px; line-height: 1.4; color:#1e293b;">
                            ${p.itensTxt}
                        </td>
                        <td style="padding: 10px 8px; border-bottom: 1px solid #e2e8f0; vertical-align: top; text-align: center; font-size: 11px; font-weight:600;">
                            ${p.pagamento || 'Dinheiro'}
                        </td>
                        <td style="padding: 10px 8px; border-bottom: 1px solid #e2e8f0; vertical-align: top; text-align: right; font-weight: bold; color:#0f172a; font-size:12px;">
                            R$ ${parseFloat(p.total || 0).toFixed(2)}
                        </td>
                    </tr>`;
            });

            let stringMeiosPagamentoHtml = '';
            for (const [metodo, valor] of Object.entries(dadosFechamentoRelatorio.porPagamento)) {
                stringMeiosPagamentoHtml += `<tr><td style="padding: 10px 12px; border-bottom: 1px solid #e2e8f0; font-weight: bold; color:#475569;">💵 ${metodo}</td><td style="padding: 10px 12px; border-bottom: 1px solid #e2e8f0; font-weight: 700; color:#cc1d1d; text-align:right;">R$ ${valor.toFixed(2)}</td></tr>`;
            }

            let stringProdutosHtml = '';
            for (const [categoria, valor] of Object.entries(dadosFechamentoRelatorio.porCategoria)) {
                stringProdutosHtml += `<tr><td style="padding: 10px 12px; border-bottom: 1px solid #e2e8f0; font-weight: 600; color:#475569;">${categoria}</td><td style="padding: 10px 12px; border-bottom: 1px solid #e2e8f0; font-weight: 600; color: #334155; text-align:right;">R$ ${valor.toFixed(2)}</td></tr>`;
            }

            iframeDoc.write(`
                <html>
                <head>
                    <style>
                        body { margin:0; padding: 20px; font-family: 'Segoe UI', Arial, sans-serif; color: #1e293b; background-color: #ffffff; }
                        .report-wrapper { width: 740px; }
                        .header-table { width:100%; border-collapse:collapse; border-bottom: 3px solid #cc1d1d; padding-bottom: 14px; margin-bottom: 25px; }
                        .section-title { font-size: 12px; font-weight: bold; background-color: #f1f5f9; padding: 10px; margin-top: 24px; margin-bottom: 12px; border-left: 4px solid #cc1d1d; text-transform: uppercase; color: #1e293b; letter-spacing:0.5px; }
                        .metrics-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 13px; }
                        .metrics-table td { padding: 10px 12px; border: 1px solid #e2e8f0; }
                        .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
                        .data-table th { padding: 10px 8px; background-color: #f8fafc; color: #475569; font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; border-bottom: 2px solid #cbd5e1; }
                    </style>
                </head>
                <body>
                    <div class="report-wrapper">
                        <table class="header-table">
                            <tr>
                                <td style="vertical-align:bottom;">
                                    <h2 style="margin: 0; color: #cc1d1d; font-size: 26px; text-transform: uppercase; letter-spacing: -0.5px; font-weight:800;">Tempero de Família</h2>
                                    <div style="font-size: 13px; font-weight: 600; color: #64748b; margin-top: 4px;">Relatório Consolidado de Fechamento Diário</div>
                                </td>
                                <td style="text-align: right; vertical-align: bottom; font-size: 11px; color: #64748b; font-weight: 600;">
                                    ${dadosFechamentoRelatorio.dataHora}
                                </td>
                            </tr>
                        </table>

                        <div class="section-title">Resumo Financeiro do Turno</div>
                        <table class="metrics-table">
                            <tr><td style="background-color: #f8fafc; font-weight: bold; width: 45%;">Faturamento Bruto Total:</td><td style="font-weight: 800; color: #cc1d1d; font-size: 15px;">${dadosFechamentoRelatorio.faturamento}</td></tr>
                            <tr><td style="background-color: #f8fafc; font-weight: bold;">Volume de Pedidos Atendidos:</td><td style="font-weight: 600;">${dadosFechamentoRelatorio.pedidos}</td></tr>
                            <tr><td style="background-color: #f8fafc; font-weight: bold;">Ticket Médio do Caixa:</td><td style="font-weight: 700; color:#334155;">${dadosFechamentoRelatorio.ticket}</td></tr>
                        </table>

                        <div class="section-title">Recebimento por Meios de Pagamento</div>
                        <table class="data-table" style="margin-bottom: 20px;">
                            <thead><tr><th style="text-align: left;">Meio de Captura</th><th style="text-align: right; width:30%;">Total Líquido</th></tr></thead>
                            <tbody>${stringMeiosPagamentoHtml}</tbody>
                        </table>

                        <div class="section-title">Análise de Performance por Produto</div>
                        <table class="data-table" style="margin-bottom: 25px;">
                            <thead><tr><th style="text-align: left;">Item / Categoria</th><th style="text-align: right; width:30%;">Total Faturado</th></tr></thead>
                            <tbody>${stringProdutosHtml}</tbody>
                        </table>
                        
                        <div class="section-title">Movimentação Analítica das Transações</div>
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th style="text-align: left; width: 12%;">Ref / Hora</th>
                                    <th style="text-align: left; width: 26%;">Cliente / Canal</th>
                                    <th style="text-align: left; width: 42%;">Produtos Lançados</th>
                                    <th style="text-align: center; width: 10%;">Forma</th>
                                    <th style="text-align: right; width: 10%;">Total</th>
                                </tr>
                            </thead>
                            <tbody>${tabelaPedidosHtml}</tbody>
                        </table>
                    </div>
                </body>
                </html>
            `);
            iframeDoc.close();

            const targetElement = iframeDoc.body;
            const configuracoes = {
                margin: [15, 14, 15, 14], 
                filename: `Fechamento_Caixa_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.pdf`,
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { scale: 2, logging: false, useCORS: true, letterRendering: true, width: 790 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(configuracoes).from(targetElement).save().then(() => {
                iframePDF.remove();
            });
        };

        window.reiniciarTurnoComSenha = async function() {
            const senhaDigitada = prompt("Para zerar o caixa e iniciar o próximo turno, digite a senha master:");
            if (senhaDigitada === "1234") {
                const novoHorarioCorte = Date.now();
                
                try {
                    await setDoc(doc(db, "configuracoes", "turno_atual"), {
                        horarioCorte: novoHorarioCorte,
                        atualizadoPor: "gabriele",
                        timestamp: Timestamp.now()
                    });
                    
                    localStorage.setItem('horarioCorteTurno', novoHorarioCorte);
                    horarioCorteTurno = novoHorarioCorte;

                    historicoGeralPedidos = [];
                    contadorPedidos = 1;
                    dadosFechamentoRelatorio = null;
                    
                    document.getElementById('corpo-historico').innerHTML = ''; 
                    document.getElementById('dashboard-vendas-tela').style.display = 'none';
                    document.getElementById('btn-pdf-id').style.display = 'none';
                    document.getElementById('btn-reset-id').style.display = 'none';
                    
                    alert("Turno encerrado globalmente.");
                    await carregarHistoricoDoFirebase();
                } catch(e) {
                    alert("Erro de conexão.");
                }
            } else if (senhaDigitada !== null) {
                alert("Senha incorreta!");
            }
        };
    </script>
